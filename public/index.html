<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsistenciaPro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#3fb950;--blue:#58a6ff;--danger:#f78166;--gold:#d29922;--muted:#8b949e;--text:#e6edf3}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(63,185,80,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(63,185,80,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 0 60px rgba(63,185,80,0.08)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#3fb950,#27a84b);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .logo h1{font-family:'DM Serif Display',serif;font-size:20px;line-height:1}
  .logo span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
  h2{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:6px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:28px}
  .error{background:rgba(247,129,102,.1);border:1px solid rgba(247,129,102,.3);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
  label{display:block;font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:.2s;margin-bottom:16px}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(63,185,80,.12)}
  .btn{width:100%;background:var(--accent);color:#0d1117;border:none;border-radius:8px;padding:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
  .btn:hover{background:#5cc96a}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .divider{border:none;border-top:1px solid var(--border);margin:24px 0}
  .btn-secondary{display:block;width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:center;text-decoration:none;transition:.2s}
  .btn-secondary:hover{background:var(--border)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div><h1>AsistenciaPro</h1><span>Labor Social · Admin</span></div>
  </div>
  <h2>Bienvenido</h2>
  <p class="sub">Ingresa tu contraseña de administrador</p>
  <div class="error" id="error">⚠ Contraseña incorrecta.</div>
  <label>Contraseña de administrador</label>
  <input type="password" id="password" placeholder="••••••••" autofocus>
  <button class="btn" id="btn" onclick="login()">🔐 Ingresar al sistema</button>
  <hr class="divider">
  <p style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:16px">¿Eres monitor y quieres usar el escáner?</p>
  <a href="/scanner.html" class="btn-secondary">📷 Ir al Escáner QR</a>
</div>

<script>
  const ADMIN_TOKEN = localStorage.getItem('admin_token') || '';

  async function login() {
    const pw  = document.getElementById('password').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('error');
    if (!pw) return;
    btn.disabled = true;
    btn.textContent = 'Verificando…';
    err.style.display = 'none';

    // Guardamos el token ingresado y probamos con /api/stats
    localStorage.setItem('admin_token', pw);
    const res = await fetch('/api/stats', { headers: { 'x-admin-token': pw } });
    if (res.ok) {
      window.location.href = '/admin.html';
    } else {
      err.style.display = 'block';
      localStorage.removeItem('admin_token');
      btn.disabled = false;
      btn.textContent = '🔐 Ingresar al sistema';
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // Si ya hay sesión válida, redirigir
  if (ADMIN_TOKEN) {
    fetch('/api/stats', { headers: { 'x-admin-token': ADMIN_TOKEN } })
      .then(r => { if (r.ok) window.location.href = '/admin.html'; });
  }
</script>
</body>
</html>
